<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background circle -->
  <circle cx="24" cy="24" r="24" fill="#863bff"/>

  <!-- Balance beam (horizontal bar) -->
  <rect x="10" y="20" width="28" height="2.5" rx="1.25" fill="white"/>

  <!-- Center post -->
  <rect x="22.75" y="14" width="2.5" height="18" rx="1.25" fill="white"/>

  <!-- Center top knob -->
  <circle cx="24" cy="14" r="2" fill="white"/>

  <!-- Left pan chain -->
  <rect x="13" y="22.5" width="1.5" height="6" rx="0.75" fill="white"/>

  <!-- Right pan chain -->
  <rect x="33.5" y="22.5" width="1.5" height="6" rx="0.75" fill="white"/>

  <!-- Left pan -->
  <path d="M10 28.5 Q13.75 32 17.5 28.5" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Right pan (slightly lower to show balance in motion) -->
  <path d="M30.5 29.5 Q34.25 33 38 29.5" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Base -->
  <rect x="19.5" y="32" width="9" height="2.5" rx="1.25" fill="white"/>
</svg>
